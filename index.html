function validatePhoneInline(){const v=clean(phone.value);if(!v){phoneError.hidden=true;return false}const ok=phoneValid(v);phoneError.hidden=ok;return ok} function collectPayload(){const method=document.querySelector("input[name='payment_method']:checked");return {invoice_no:padInvoice(invoiceNo.value),order_date:$("orderDate").value,customer_name:clean($("customerName").value),phone:clean(phone.value),address_region:addressRegion.value,address_district:addressDistrict.value,address_detail:clean(addressDetail.value),package_type:selectedPackage,payment_method:method?method.value:"",remarks:clean($("remarks").value),items:collectItems()}}
function validatePayload(p){const errors=[],district=currentDistrictInfo();if(!p.invoice_no)errors.push("請填寫 Invoice No.。");if(!/^\d{4}-\d{2}-\d{2}$/.test(p.order_date))errors.push("請填寫有效下單日期。");if(!p.customer_name)errors.push("請填寫客戶姓名。");if(!p.phone)errors.push("請填寫電話。");else if(!phoneValid(p.phone))errors.push("電話必須是8位數字。");if(!p.address_region||!p.address_district)errors.push("請選擇區域及地區。");if(district&&!district.deliverable)errors.push("所選地區暫不支援派送，不能提交訂單。");if(!p.address_detail)errors.push("請填寫詳細地址。");if(!p.package_type)errors.push("請選擇 package。");if(p.package_type){const pkg=PACKAGE_OPTIONS[p.package_type],total=selectedQtyTotal();if(total!==pkg.boxes)errors.push(`此 package 必須剛好輸入 ${pkg.boxes} 盒，現在已輸入 ${total} 盒。`)}return errors}
function getSavedRows(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]")}catch(e){return[]}} function saveRows(rows){localStorage.setItem(STORAGE_KEY,JSON.stringify(rows));updateSavedSummary()} function duplicateOrderId(id){return getSavedRows().some(r=>r.order_id===id)}
function buildOrderRows(p){const pkg=PACKAGE_OPTIONS[p.package_type],orderId=`EXPO-${p.invoice_no}`,dt=`${p.order_date} 00:00:00`,addr=`${p.address_region} - ${p.address_district} - ${p.address_detail}`;return allocateAmounts(p.items,pkg).map((it,idx)=>({order_id:orderId,order_datetime:dt,customer_name:p.customer_name,phone:p.phone,address:addr,product_line:it.product_line,product_code:it.product_code,product_name:it.product_name,unit_price:it.unit_price,quantity:it.quantity,line_total:it.line_total,order_total:pkg.price,juice:idx===0?pkg.juice:0,ice_bag:idx===0?pkg.ice_bag:0,payment_method:p.payment_method,remarks:p.remarks}))}
function updateSavedSummary(){const rows=getSavedRows(),count=new Set(rows.map(r=>r.order_id)).size;savedSummary.textContent=`已儲存 ${count} 張訂單 / ${rows.length} 行明細`} function resetForm(){orderForm.reset();$("orderDate").value=todayISO();invoiceNo.value="";phoneError.hidden=true;addressRegion.value="";addressDistrict.value="";selectedRegion="";selectedPackage="";qtyInputs().forEach(i=>i.value="0");updateAddressButton();updatePackageUI()}
function csvEscape(v){const t=String(v??"");return /[",\n\r]/.test(t)?`"${t.replace(/"/g,'""')}"`:t} function rowsToCsv(rows){return [HEADERS.join(","),...rows.map(r=>HEADERS.map(h=>csvEscape(r[h])).join(","))].join("\r\n")} function downloadBlob(blob,name){const url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},500)}
function exportCsv(){const rows=getSavedRows();if(!rows.length){showAlert("目前沒有可匯出的訂單。","error");return}downloadBlob(new Blob(["\ufeff"+rowsToCsv(rows)],{type:"text/csv;charset=utf-8"}),`expo_sales_orders_${todayISO()}.csv`)} function exportExcel(){const rows=getSavedRows();if(!rows.length){showAlert("目前沒有可匯出的訂單。","error");return}const th=HEADERS.map(h=>`<th>${escapeHtml(h)}</th>`).join(""),trs=rows.map(r=>`<tr>${HEADERS.map(h=>`<td>${escapeHtml(r[h]??"")}</td>`).join("")}</tr>`).join("");downloadBlob(new Blob([`<!doctype html><html><head><meta charset="utf-8"></head><body><table border="1"><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table></body></html>`],{type:"application/vnd.ms-excel;charset=utf-8"}),`expo_sales_orders_${todayISO()}.xls`)}
function init(){renderPackages();renderPaymentMethods();renderProducts();resetForm();updateSavedSummary();phone.addEventListener("input",()=>{phone.value=phone.value.replace(/\D/g,"").slice(0,8);if(!phoneError.hidden)validatePhoneInline()});phone.addEventListener("blur",validatePhoneInline);invoiceNo.addEventListener("blur",()=>invoiceNo.value=padInvoice(invoiceNo.value));openAddressPicker.addEventListener("click",openPicker);closeAddressPicker.addEventListener("click",()=>addressPicker.hidden=true);addressPicker.addEventListener("click",e=>{if(e.target===addressPicker)addressPicker.hidden=true});districtSearch.addEventListener("input",renderPicker);clearDistrictSearch.addEventListener("click",()=>{districtSearch.value="";renderPicker()});allRegionTab.addEventListener("click",()=>{selectedRegion="";pickerMode="region";districtSearch.value="";renderPicker()});selectedRegionTab.addEventListener("click",()=>{pickerMode="district";districtSearch.value="";renderPicker()});noticeOk.addEventListener("click",closeNotice);noticeModal.addEventListener("click",e=>{if(e.target===noticeModal)closeNotice()});$("exportCsvBtn").addEventListener("click",exportCsv);$("exportExcelBtn").addEventListener("click",exportExcel);$("clearOrdersBtn").addEventListener("click",()=>{if(confirm("確定要清除已儲存的所有訂單？此操作不能復原。")){saveRows([]);showAlert("已清除本機暫存訂單。","success")}});orderForm.addEventListener("submit",e=>{e.preventDefault();clearAlert();invoiceNo.value=padInvoice(invoiceNo.value);validatePhoneInline();const p=collectPayload(),errs=validatePayload(p);if(errs.length){showAlert(errs.join("\n"),"error");return}const id=`EXPO-${p.invoice_no}`;if(duplicateOrderId(id)){showAlert(`Invoice No. ${p.invoice_no} 已經輸入過，請檢查收據號碼。`,"error");return}saveRows([...getSavedRows(),...buildOrderRows(p)]);resetForm();showAlert(`訂單已成功儲存。Order ID: ${id}`,"success")});}
document.addEventListener("DOMContentLoaded", init);
if ("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("./service-worker.js").catch(e=>console.log("Service worker registration failed:",e));});}
</script>
</body></html>
